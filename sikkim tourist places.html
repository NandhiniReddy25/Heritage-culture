<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heritage · Culture · Tourism - Sikkim</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
    }

    header {
      background: #4b0082;
      color: white;
      text-align: center;
      padding: 20px;
    }

    /* Tourist Places Section */
    #famous-places {
      padding: 30px;
    }

    .places-gallery {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }

    .place-item {
      background: white;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 15px;
      width: 220px;
    }

    .place-item img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    .place-item h3 {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Heritage · Culture · Tourism</h1>
    <p>Explore Sikkim’s rich heritage, culture, and tourism</p>
  </header>

  <main>
    <!-- Tourist Places Section -->
    <section id="famous-places">
      <h2 style="text-align:center;">Famous Tourist Places of Sikkim</h2>
      <div class="places-gallery">
        <div class="place-item">
          <img src="https://s7ap1.scene7.com/is/image/incredibleindia/tsomgo-lake-gangtok-sikkim-city-ff?qlt=82&ts=1742156268886" alt="Gangtok">
          <h3>Gangtok</h3>
        </div>
        <div class="place-item">
          <img src="https://s7ap1.scene7.com/is/image/incredibleindia/tsomgo-lake-gangtok-sikkim-1-attr-hero?qlt=82&ts=1742160335690" alt="Tsomgo Lake">
          <h3>Tsomgo Lake</h3>
        </div>
        <div class="place-item">
          <img src="https://media1.thrillophilia.com/filestore/wmv35tgt1clsyhq1i1eib7jywd76_shutterstock_1040258842.jpg?w=400&dpr=2" alt="Nathula Pass">
          <h3>Nathula Pass</h3>
        </div>
        <div class="place-item">
          <img src="https://s7ap1.scene7.com/is/image/incredibleindia/borong-pelling-sikkim-hot-springs-hero?qlt=82&ts=1726655988727" alt="Pelling">
          <h3>Pelling</h3>
        </div>
        <div class="place-item">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ79hd8Q7rZGHtObY4kJPKRKTOp6O6uYN-UZQ&s" alt="Rumtek Monastery">
          <h3>Rumtek Monastery</h3>
        </div>
        <div class="place-item">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQBx4LCq9ucLR-VgGBZszHlJtAuzuRslo2SXg&s" alt="Namchi">
          <h3>Namchi</h3>
        </div>
        <div class="place-item">
          <img src="https://upload.wikimedia.org/wikipedia/commons/d/d7/Yumthang_valley%2C_Lachung_Sikkim_India_2012.jpg" alt="Yumthang Valley">
          <h3>Yumthang Valley</h3>
        </div>
        <div class="place-item">
          <img src="https://static2.tripoto.com/media/filter/tst/img/1227694/TripDocument/1628399950_1.png" alt="Baba Harbhajan Shaheed">
          <h3>Baba Harbhajan Shaheed Memorial</h3>
        </div>
        <div class="place-item">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT0tFWUlr8WyxFt6P-ESWQ5hjTRbYvP3TgbsA&s" alt="Enchey Monastery">
          <h3>Enchey Monastery</h3>
        </div>
        <div class="place-item">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRfvEL5bqo80ldZq2cFml_XyLBmxexwV5610Q&s" alt="Tawang">
          <h3>Nearby Tawang Area</h3>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
