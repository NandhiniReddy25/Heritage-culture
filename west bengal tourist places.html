<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heritage · Culture · Tourism - West Bengal</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
    }

    header {
      background: #4b0082;
      color: white;
      text-align: center;
      padding: 20px;
    }

    /* Tourist Places Section */
    #famous-places {
      padding: 30px;
    }

    .places-gallery {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }

    .place-item {
      background: white;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 15px;
      width: 220px;
    }

    .place-item img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    .place-item h3 {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Heritage · Culture · Tourism</h1>
    <p>Explore West Bengal’s rich heritage, culture, and tourism</p>
  </header>

  <main>
    <!-- Tourist Places Section -->
    <section id="famous-places">
      <h2 style="text-align:center;">Famous Tourist Places of West Bengal</h2>
      <div class="places-gallery">
        <div class="place-item">
          <img src="https://tse2.mm.bing.net/th/id/OIP.30vVFlV5U4_-iEGxf8soiwHaEK?pid=Api&P=0&h=180" alt="Victoria Memorial Kolkata">
          <h3>Victoria Memorial, Kolkata</h3>
        </div>
        <div class="place-item">
          <img src="https://tse4.mm.bing.net/th/id/OIP.gbMx3onvbrfBi5xioN3dBQHaEK?pid=Api&P=0&h=180" alt="Darjeeling">
          <h3>Darjeeling</h3>
        </div>
        <div class="place-item">
          <img src="https://tse4.mm.bing.net/th/id/OIP.riryGoL3JtxaE5YAp-4E_QHaEK?pid=Api&P=0&h=180" alt="Sundarbans">
          <h3>Sundarbans</h3>
        </div>
        <div class="place-item">
          <img src="https://tse3.mm.bing.net/th/id/OIP.S9uPWxyWKKEpkInR-aLrOgHaEe?pid=Api&P=0&h=180" alt="Kalimpong">
          <h3>Kalimpong</h3>
        </div>
        <div class="place-item">
          <img src="https://tse2.mm.bing.net/th/id/OIP.eN-NdryM7qkK7sLs7xHgtgHaD4?pid=Api&P=0&h=180" alt="Dooars">
          <h3>Dooars</h3>
        </div>
        <div class="place-item">
          <img src="https://tse1.mm.bing.net/th/id/OIP.II19zscIgxvyIwBNEpaEAgHaE8?pid=Api&P=0&h=180" alt="Siliguri">
          <h3>Siliguri</h3>
        </div>
        <div class="place-item">
          <img src="https://tse2.mm.bing.net/th/id/OIP.n_nBi7vdLFfSn6SPCs0W3AHaD4?pid=Api&P=0&h=180" alt="Mirik Lake">
          <h3>Mirik</h3>
        </div>
        <div class="place-item">
          <img src="https://tse1.mm.bing.net/th/id/OIP.AkeaF5HCTlA--xwVQmV-WAHaEG?pid=Api&P=0&h=180" alt="Digha Beach">
          <h3>Digha Beach</h3>
        </div>
        <div class="place-item">
          <img src="https://tse1.mm.bing.net/th/id/OIP.C-lmszS01DiiK7P2vDIFIwHaD4?pid=Api&P=0&h=180" alt="Shantiniketan">
          <h3>Shantiniketan</h3>
        </div>
        <div class="place-item">
          <img src="https://tse3.mm.bing.net/th/id/OIP.trCHesLOaygiHX_Yk4fAIQHaEv?pid=Api&P=0&h=180" alt="Jaldapara National Park">
          <h3>Jaldapara National Park</h3>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
