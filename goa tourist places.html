<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heritage · Culture · Tourism - Goa</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
    }

    header {
      background: #4b0082;
      color: white;
      text-align: center;
      padding: 20px;
    }

    /* Tourist Places Section */
    #famous-places {
      padding: 30px;
    }

    .places-gallery {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }

    .place-item {
      background: white;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 15px;
      width: 220px;
    }

    .place-item img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    .place-item h3 {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Heritage · Culture · Tourism</h1>
    <p>Explore Goa’s rich heritage, culture, and tourism</p>
  </header>

  <main>
    <!-- Tourist Places Section -->
    <section id="famous-places">
      <h2 style="text-align:center;">Famous Tourist Places of Goa</h2>
      <div class="places-gallery">
        <div class="place-item">
          <img src="images/baga-beach.png" alt="Baga Beach">
          <h3>Baga Beach</h3>
        </div>
        <div class="place-item">
          <img src="images/calangute.png" alt="Calangute Beach">
          <h3>Calangute Beach</h3>
        </div>
        <div class="place-item">
          <img src="images/anjuna.png" alt="Anjuna Beach">
          <h3>Anjuna Beach</h3>
        </div>
        <div class="place-item">
          <img src="images/dudhsagar.png" alt="Dudhsagar Waterfalls">
          <h3>Dudhsagar Waterfalls</h3>
        </div>
        <div class="place-item">
          <img src="images/basilica.png" alt="Basilica of Bom Jesus">
          <h3>Basilica of Bom Jesus</h3>
        </div>
        <div class="place-item">
          <img src="images/fort-aguada.png" alt="Fort Aguada">
          <h3>Fort Aguada</h3>
        </div>
        <div class="place-item">
          <img src="images/chapora-fort.png" alt="Chapora Fort">
          <h3>Chapora Fort</h3>
        </div>
        <div class="place-item">
          <img src="images/se-cathedral.png" alt="Se Cathedral">
          <h3>Se Cathedral</h3>
        </div>
        <div class="place-item">
          <img src="images/palolem.jpeg" alt="Palolem Beach">
          <h3>Palolem Beach</h3>
        </div>
        <div class="place-item">
          <img src="images/mangeshi-temple.jpeg" alt="Shri Mangeshi Temple">
          <h3>Shri Mangeshi Temple</h3>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
