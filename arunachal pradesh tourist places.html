<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heritage · Culture · Tourism - Arunachal Pradesh</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
    }

    header {
      background: #4b0082;
      color: white;
      text-align: center;
      padding: 20px;
    }

    /* Tourist Places Section */
    #famous-places {
      padding: 30px;
    }

    .places-gallery {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }

    .place-item {
      background: white;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 15px;
      width: 220px;
    }

    .place-item img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    .place-item h3 {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Heritage · Culture · Tourism</h1>
    <p>Explore Arunachal Pradesh’s rich heritage, culture, and tourism</p>
  </header>

  <main>
    <!-- Tourist Places Section -->
    <section id="famous-places">
      <h2 style="text-align:center;">Famous Tourist Places of Arunachal Pradesh</h2>
      <div class="places-gallery">
        <div class="place-item">
          <img src="images/tawang.jpg" alt="Tawang Monastery">
          <h3>Tawang Monastery</h3>
        </div>
        <div class="place-item">
          <img src="images/ziro.jpg" alt="Ziro Valley">
          <h3>Ziro Valley</h3>
        </div>
        <div class="place-item">
          <img src="images/bomdila.jpg" alt="Bomdila">
          <h3>Bomdila</h3>
        </div>
        <div class="place-item">
          <img src="images/itanagar.jpg" alt="Itanagar">
          <h3>Itanagar</h3>
        </div>
        <div class="place-item">
          <img src="images/namdapha.jpg" alt="Namdapha National Park">
          <h3>Namdapha National Park</h3>
        </div>
        <div class="place-item">
          <img src="images/sela-pass.jpg" alt="Sela Pass">
          <h3>Sela Pass</h3>
        </div>
        <div class="place-item">
          <img src="images/dirang.jpg" alt="Dirang">
          <h3>Dirang</h3>
        </div>
        <div class="place-item">
          <img src="images/bhalukpong.jpg" alt="Bhalukpong">
          <h3>Bhalukpong</h3>
        </div>
        <div class="place-item">
          <img src="images/roing.jpg" alt="Roing">
          <h3>Roing</h3>
        </div>
        <div class="place-item">
          <img src="images/anini.jpg" alt="Anini">
          <h3>Anini</h3>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
