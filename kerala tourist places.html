<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heritage · Culture · Tourism - Kerala</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
    }

    header {
      background: #4b0082;
      color: white;
      text-align: center;
      padding: 20px;
    }

    /* Tourist Places Section */
    #famous-places {
      padding: 30px;
    }

    .places-gallery {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }

    .place-item {
      background: white;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 15px;
      width: 220px;
    }

    .place-item img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    .place-item h3 {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Heritage · Culture · Tourism</h1>
    <p>Explore Kerala’s rich heritage, culture, and tourism</p>
  </header>

  <main>
    <!-- Tourist Places Section -->
    <section id="famous-places">
      <h2 style="text-align:center;">Famous Tourist Places of Kerala</h2>
      <div class="places-gallery">
        <div class="place-item">
          <img src="https://tse3.mm.bing.net/th/id/OIP.NbDy1GB1HJL2S-lEuWnoRgHaFj?pid=Api&P=0&h=180" alt="Alleppey Backwaters">
          <h3>Alleppey Backwaters</h3>
        </div>
        <div class="place-item">
          <img src="https://tse1.mm.bing.net/th/id/OIP.7Sl7uVy7mRMac4VQfwq2BQHaE8?pid=Api&P=0&h=180" alt="Munnar">
          <h3>Munnar</h3>
        </div>
        <div class="place-item">
          <img src="https://tse2.mm.bing.net/th/id/OIP.GA4OXJ5n-0XzjHeFz0jW8AHaEo?pid=Api&P=0&h=180" alt="Kovalam Beach">
          <h3>Kovalam Beach</h3>
        </div>
        <div class="place-item">
          <img src="https://tse1.mm.bing.net/th/id/OIP.3PJTDtzDuNukXzYmRboaQQHaE8?pid=Api&P=0&h=180" alt="Thekkady">
          <h3>Thekkady</h3>
        </div>
        <div class="place-item">
          <img src="https://tse1.mm.bing.net/th/id/OIP.22kEfvUP94qTamtK_vMeMQHaEK?pid=Api&P=0&h=180" alt="Wayanad">
          <h3>Wayanad</h3>
        </div>
        <div class="place-item">
          <img src="https://tse4.mm.bing.net/th/id/OIP.enfre7c2K15Z-6T_SEvNFAHaEo?pid=Api&P=0&h=180" alt="Kumarakom">
          <h3>Kumarakom</h3>
        </div>
        <div class="place-item">
          <img src="https://tse1.mm.bing.net/th/id/OIP.xEX8VJs0D9jaGNDYMaY1OgHaE8?pid=Api&P=0&h=180" alt="Varkala Beach">
          <h3>Varkala Beach</h3>
        </div>
        <div class="place-item">
          <img src="https://tse1.mm.bing.net/th/id/OIP.2P9a13xKFGQ6DRu7Oz7mqgHaEh?pid=Api&P=0&h=180" alt="Athirappilly Waterfalls">
          <h3>Athirappilly Waterfalls</h3>
        </div>
        <div class="place-item">
          <img src="https://tse4.mm.bing.net/th/id/OIP.AsLuyjJ-A8u0M7zk6pdA0QHaD2?pid=Api&P=0&h=180" alt="Fort Kochi">
          <h3>Fort Kochi</h3>
        </div>
        <div class="place-item">
          <img src="https://tse4.mm.bing.net/th/id/OIP.qqhThV1lL8ASsgMKomcbgwHaEK?pid=Api&P=0&h=180" alt="Bekal Fort">
          <h3>Bekal Fort</h3>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
