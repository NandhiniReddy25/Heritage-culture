<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heritage · Culture · Tourism - Assam</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
    }

    header {
      background: #4b0082;
      color: white;
      text-align: center;
      padding: 20px;
    }

    /* Tourist Places Section */
    #famous-places {
      padding: 30px;
    }

    .places-gallery {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }

    .place-item {
      background: white;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 15px;
      width: 220px;
    }

    .place-item img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    .place-item h3 {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Heritage · Culture · Tourism</h1>
    <p>Explore Assam’s rich heritage, culture, and tourism</p>
  </header>

  <main>
    <!-- Tourist Places Section -->
    <section id="famous-places">
      <h2 style="text-align:center;">Famous Tourist Places of Assam</h2>
      <div class="places-gallery">
        <div class="place-item">
          <img src="images/kaziranga.jpg" alt="Kaziranga National Park">
          <h3>Kaziranga National Park</h3>
        </div>
        <div class="place-item">
          <img src="images/manas.jpg" alt="Manas National Park">
          <h3>Manas National Park</h3>
        </div>
        <div class="place-item">
          <img src="images/majuli.jpg" alt="Majuli Island">
          <h3>Majuli Island</h3>
        </div>
        <div class="place-item">
          <img src="images/sibsagar.jpg" alt="Sivasagar">
          <h3>Sivasagar</h3>
        </div>
        <div class="place-item">
          <img src="images/umrangso.jpg" alt="Umrangso">
          <h3>Umrangso</h3>
        </div>
        <div class="place-item">
          <img src="images/hajo.jpg" alt="Hajo">
          <h3>Hajo</h3>
        </div>
        <div class="place-item">
          <img src="images/jorhat.jpg" alt="Jorhat">
          <h3>Jorhat</h3>
        </div>
        <div class="place-item">
          <img src="images/guwahati.jpg" alt="Guwahati (Kamakhya Temple)">
          <h3>Guwahati (Kamakhya Temple)</h3>
        </div>
        <div class="place-item">
          <img src="images/dibrugarh.jpg" alt="Dibrugarh">
          <h3>Dibrugarh</h3>
        </div>
        <div class="place-item">
          <img src="images/barak-valley.jpg" alt="Barak Valley">
          <h3>Barak Valley</h3>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
