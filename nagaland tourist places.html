<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heritage · Culture · Tourism - Nagaland</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
    }

    header {
      background: #4b0082;
      color: white;
      text-align: center;
      padding: 20px;
    }

    /* Tourist Places Section */
    #famous-places {
      padding: 30px;
    }

    .places-gallery {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }

    .place-item {
      background: white;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 15px;
      width: 220px;
    }

    .place-item img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    .place-item h3 {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Heritage · Culture · Tourism</h1>
    <p>Explore Nagaland’s rich heritage, culture, and tourism</p>
  </header>

  <main>
    <!-- Tourist Places Section -->
    <section id="famous-places">
      <h2 style="text-align:center;">Famous Tourist Places of Nagaland</h2>
      <div class="places-gallery">
        <div class="place-item">
          <img src="https://tse3.mm.bing.net/th/id/OIP.qVTgIS5DLkLS3MmSRe3GTgHaEK?pid=Api&P=0&h=180" alt="Kohima">
          <h3>Kohima</h3>
        </div>
        <div class="place-item">
          <img src="https://tse3.mm.bing.net/th/id/OIP.1-Nu01L8DnpljHLOLLh0bAHaE8?pid=Api&P=0&h=180" alt="Dimapur">
          <h3>Dimapur</h3>
        </div>
        <div class="place-item">
          <img src="https://tse2.mm.bing.net/th/id/OIP.A6Z16rU9Xh3hw2Mb4qVFxwHaEP?pid=Api&P=0&h=180" alt="Mokokchung">
          <h3>Mokokchung</h3>
        </div>
        <div class="place-item">
          <img src="https://tse1.mm.bing.net/th/id/OIP.UGHGSqFBWunQICZpMMAKqwHaE6?pid=Api&P=0&h=180" alt="Mon">
          <h3>Mon</h3>
        </div>
        <div class="place-item">
          <img src="https://tse3.mm.bing.net/th/id/OIP.Y-T7Dv6KisHqF1ydPzN8kQHaFj?pid=Api&P=0&h=180" alt="Dzukou Valley">
          <h3>Dzukou Valley</h3>
        </div>
        <div class="place-item">
          <img src="https://tse2.mm.bing.net/th/id/OIP.KcBjnI7mP252KErIuzriLQHaDx?pid=Api&P=0&h=180" alt="Japfu Peak">
          <h3>Japfu Peak</h3>
        </div>
        <div class="place-item">
          <img src="https://tse1.mm.bing.net/th/id/OIP._9hf6bE1W24YeSSkNrFadAHaE8?pid=Api&P=0&h=180" alt="Khonoma Village">
          <h3>Khonoma Village</h3>
        </div>
        <div class="place-item">
          <img src="https://tse3.mm.bing.net/th/id/OIP.Yk2EA7FXvoOJY-EV3vLEAAHaE8?pid=Api&P=0&h=180" alt="Tuophema Village">
          <h3>Tuophema Village</h3>
        </div>
        <div class="place-item">
          <img src="https://tse1.mm.bing.net/th/id/OIP.ks35JshJmzu8hkzJUzXl_AEgDY?pid=Api&P=0&h=180" alt="Shilloi Lake">
          <h3>Shilloi Lake</h3>
        </div>
        <div class="place-item">
          <img src="https://tse4.mm.bing.net/th/id/OIP.81Rk4jr7E_DT5Hv7yUEkigHaE8?pid=Api&P=0&h=180" alt="Ntangki National Park">
          <h3>Ntangki National Park</h3>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
