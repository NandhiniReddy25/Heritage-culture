<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heritage · Culture · Tourism - Mizoram</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
    }

    header {
      background: #4b0082;
      color: white;
      text-align: center;
      padding: 20px;
    }

    /* Tourist Places Section */
    #famous-places {
      padding: 30px;
    }

    .places-gallery {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }

    .place-item {
      background: white;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 15px;
      width: 220px;
    }

    .place-item img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    .place-item h3 {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Heritage · Culture · Tourism</h1>
    <p>Explore Mizoram’s rich heritage, culture, and tourism</p>
  </header>

  <main>
    <!-- Tourist Places Section -->
    <section id="famous-places">
      <h2 style="text-align:center;">Famous Tourist Places of Mizoram</h2>
      <div class="places-gallery">
        <div class="place-item">
          <img src="https://tse1.mm.bing.net/th/id/OIP.tQRF2Co6gbLs6r6lpBYi3AHaEK?pid=Api&P=0&h=180" alt="Aizawl">
          <h3>Aizawl</h3>
        </div>
        <div class="place-item">
          <img src="https://tse2.mm.bing.net/th/id/OIP._iKs7wixBaVSOcrO17YPfwHaFj?pid=Api&P=0&h=180" alt="Falkawn Village">
          <h3>Falkawn Village</h3>
        </div>
        <div class="place-item">
          <img src="https://tse3.mm.bing.net/th/id/OIP.ZbY8Ndf4YY0zrIAyPxpMOQHaFb?pid=Api&P=0&h=180" alt="Phawngpui Hills">
          <h3>Phawngpui (Blue Mountain)</h3>
        </div>
        <div class="place-item">
          <img src="https://tse2.mm.bing.net/th/id/OIP.ze5oEs6NUmW8jWYjudcLtgHaE8?pid=Api&P=0&h=180" alt="Reiek">
          <h3>Reiek Tlang</h3>
        </div>
        <div class="place-item">
          <img src="https://tse1.mm.bing.net/th/id/OIP.1c8uZf3qZD6nIlSHBOc4OQHaEK?pid=Api&P=0&h=180" alt="Tam Dil Lake">
          <h3>Tam Dil Lake</h3>
        </div>
        <div class="place-item">
          <img src="https://tse1.mm.bing.net/th/id/OIP.ziq9Wt3tdl4RgeAhTpuhFwHaE8?pid=Api&P=0&h=180" alt="Vantawng Falls">
          <h3>Vantawng Falls</h3>
        </div>
        <div class="place-item">
          <img src="https://tse3.mm.bing.net/th/id/OIP.F_M3m4AbcnWUKVRdbBxWlQHaEK?pid=Api&P=0&h=180" alt="Hmuifang Hills">
          <h3>Hmuifang Hills</h3>
        </div>
        <div class="place-item">
          <img src="https://tse2.mm.bing.net/th/id/OIP.5jwJHyRyaVJrZQDWl5iWzQHaE8?pid=Api&P=0&h=180" alt="Lunglei">
          <h3>Lunglei</h3>
        </div>
        <div class="place-item">
          <img src="https://tse3.mm.bing.net/th/id/OIP.Mx6s0SUXLN-Se-0eB-IIwAAAAA?pid=Api&P=0&h=180" alt="Serchhip">
          <h3>Serchhip</h3>
        </div>
        <div class="place-item">
          <img src="https://tse3.mm.bing.net/th/id/OIP.LQWYHnNXkQgnPDA7-RaoewHaEK?pid=Api&P=0&h=180" alt="Khawnglung Wildlife Sanctuary">
          <h3>Khawnglung Wildlife Sanctuary</h3>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
