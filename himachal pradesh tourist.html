<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heritage · Culture · Tourism - Himachal Pradesh</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
    }

    header {
      background: #4b0082;
      color: white;
      text-align: center;
      padding: 20px;
    }

    /* Tourist Places Section */
    #famous-places {
      padding: 30px;
    }

    .places-gallery {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }

    .place-item {
      background: white;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 15px;
      width: 220px;
    }

    .place-item img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    .place-item h3 {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Heritage · Culture · Tourism</h1>
    <p>Explore Himachal Pradesh’s rich heritage, culture, and tourism</p>
  </header>

  <main>
    <!-- Tourist Places Section -->
    <section id="famous-places">
      <h2 style="text-align:center;">Famous Tourist Places of Himachal Pradesh</h2>
      <div class="places-gallery">
        <div class="place-item">
          <img src="https://tse2.mm.bing.net/th/id/OIP.8id8obQ6IgEro3Bsz5mLcgHaE8?pid=Api&P=0&h=180" alt="Shimla">
          <h3>Shimla</h3>
        </div>
        <div class="place-item">
          <img src="https://tse3.mm.bing.net/th/id/OIP.Fqt7piVdVwL402GFdat0mQHaJQ?pid=Api&P=0&h=180" alt="Manali">
          <h3>Manali</h3>
        </div>
        <div class="place-item">
          <img src="https://tse3.mm.bing.net/th/id/OIP.qxZdMW5irGIBLmsbStmFGgHaE7?pid=Api&P=0&h=180" alt="Dharamshala">
          <h3>Dharamshala</h3>
        </div>
        <div class="place-item">
          <img src="https://tse4.mm.bing.net/th/id/OIP.mprr-tPrX1DJ-2K7HWV-lAHaE8?pid=Api&P=0&h=180" alt="Dalhousie">
          <h3>Dalhousie</h3>
        </div>
        <div class="place-item">
          <img src="https://tse1.mm.bing.net/th/id/OIP.urEfBP9wLlayC4Ncv91WSwHaDt?pid=Api&P=0&h=180" alt="Spiti Valley">
          <h3>Spiti Valley</h3>
        </div>
        <div class="place-item">
          <img src="https://www.internationaltravelhouse.in/images/honeymoon/Fortune-Kasauli.jpg" alt="Kasauli">
          <h3>Kasauli</h3>
        </div>
        <div class="place-item">
          <img src="https://chaloghumane.com/wp-content/uploads/2021/08/Chamba.jpg" alt="Chamba">
          <h3>Chamba</h3>
        </div>
        <div class="place-item">
          <img src="https://tse3.mm.bing.net/th/id/OIP._SVGCO9Rm_AIDfTcqIPELwHaEK?pid=Api&P=0&h=180" alt="Kullu">
          <h3>Kullu</h3>
        </div>
        <div class="place-item">
          <img src="https://tse2.mm.bing.net/th/id/OIP.niqeb69acH3AUYjhwp0-iAHaEK?pid=Api&P=0&h=180" alt="McLeodganj">
          <h3>McLeodganj</h3>
        </div>
        <div class="place-item">
          <img src="https://tse4.mm.bing.net/th/id/OIP.bYbRhgJeiIeWtOSLDIsjpgHaDt?pid=Api&P=0&h=180" alt="Khajjiar">
          <h3>Khajjiar (Mini Switzerland of India)</h3>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
