<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heritage · Culture · Tourism - Uttarakhand</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
    }

    header {
      background: #4b0082;
      color: white;
      text-align: center;
      padding: 20px;
    }

    /* Tourist Places Section */
    #famous-places {
      padding: 30px;
    }

    .places-gallery {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }

    .place-item {
      background: white;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 15px;
      width: 220px;
    }

    .place-item img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    .place-item h3 {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Heritage · Culture · Tourism</h1>
    <p>Explore Uttarakhand’s rich heritage, culture, and tourism</p>
  </header>

  <main>
    <!-- Tourist Places Section -->
    <section id="famous-places">
      <h2 style="text-align:center;">Famous Tourist Places of Uttarakhand</h2>
      <div class="places-gallery">
        <div class="place-item">
          <img src="https://tse3.mm.bing.net/th/id/OIP.RNFEWBCfUxVA5c6jR4xnnAHaE8?pid=Api&P=0&h=180" alt="Rishikesh">
          <h3>Rishikesh</h3>
        </div>
        <div class="place-item">
          <img src="https://tse2.mm.bing.net/th/id/OIP.6thEflZbIosJexdVhvWgwgHaE8?pid=Api&P=0&h=180g" alt="Haridwar">
          <h3>Haridwar</h3>
        </div>
        <div class="place-item">
          <img src="https://tse3.mm.bing.net/th/id/OIP.Bqn10t9Go531CJU3-O74mAHaDS?pid=Api&P=0&h=180" alt="Mussoorie Hill Station">
          <h3>Mussoorie</h3>
        </div>
        <div class="place-item">
          <img src="https://tse1.mm.bing.net/th/id/OIP.5VUkSIviLdpJB_w2c3eomAHaEP?pid=Api&P=0&h=180" alt="Nainital Lake">
          <h3>Nainital</h3>
        </div>
        <div class="place-item">
          <img src="https://tse2.mm.bing.net/th/id/OIP.ipF77-Fa1Yk2ZZRUJQzpQAHaES?pid=Api&P=0&h=180" alt="Jim Corbett National Park">
          <h3>Jim Corbett National Park</h3>
        </div>
        <div class="place-item">
          <img src="https://tse2.mm.bing.net/th/id/OIP.x9MLSUU15G5Z03paJirwxQHaEK?pid=Api&P=0&h=180" alt="Valley of Flowers">
          <h3>Valley of Flowers</h3>
        </div>
        <div class="place-item">
          <img src="https://tse1.mm.bing.net/th/id/OIP.JXAbDXNsybuVOgBfoAkVAQHaDt?pid=Api&P=0&h=180" alt="Auli">
          <h3>Auli</h3>
        </div>
        <div class="place-item">
          <img src="https://tse2.mm.bing.net/th/id/OIP.0vVcRceWP6-Ws1k7uP3JMQHaFj?pid=Api&P=0&h=180" alt="Chopta">
          <h3>Chopta</h3>
        </div>
        <div class="place-item">
          <img src="https://tse4.mm.bing.net/th/id/OIP.Y0ZgMrHyYL83URM4-bVGsAHaDp?pid=Api&P=0&h=180" alt="Ranikhet">
          <h3>Ranikhet</h3>
        </div>
        <div class="place-item">
          <img src="https://tse2.mm.bing.net/th/id/OIP.u_UFPxv1I3vbAfGi37bYhQHaE8?pid=Api&P=0&h=180" alt="Lansdowne">
          <h3>Lansdowne</h3>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
