<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heritage · Culture · Tourism</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
    }

    header {
      background: #4b0082;
      color: white;
      text-align: center;
      padding: 20px;
    }

    /* Tourist Places Section */
    #famous-places {
      padding: 30px;
    }

    .places-gallery {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }

    .place-item {
      background: white;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 15px;
      width: 220px;
    }

    .place-item img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    .place-item h3 {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Heritage · Culture · Tourism</h1>
    <p>Explore India’s rich heritage, culture, and tourism</p>
  </header>

  <main>
    <!-- Tourist Places Section -->
    <section id="famous-places">
      <h2 style="text-align:center;">Famous Tourist Places</h2>
      <div class="places-gallery">
        <div class="place-item">
          <img src="images/horsley hills.jpg" alt="horsley hills">
          <h3>horsley hills</h3>
        </div>
        <div class="place-item">
          <img src="images/araku valley.jpg" alt="Araku Valley">
          <h3>Araku Valley</h3>
        </div>
        <div class="place-item">
          <img src="images/vizag.jpg" alt="Visakhapatnam Beach">
          <h3>Visakhapatnam Beach</h3>
        </div>
        <div class="place-item">
          <img src="images/lambasingi.jpg" alt="lambasingi">
          <h3>lambasingi</h3>
        </div>
        <div class="place-item">
          <img src="images/rk beach.jpg" alt="rk beach">
          <h3>rk beach</h3>
        </div>
        <div class="place-item">
          <img src="images/gandikota.jpg" alt="Gandikota">
          <h3>Gandikota (Grand Canyon of India)</h3>
        </div>
        <div class="place-item">
          <img src="images/yarada beach.jpg" alt="yarada beach">
          <h3>yarada beach</h3>
        </div>
        <div class="place-item">
          <img src="images/belum caves.jpg" alt="belum caves">
          <h3>belum caves</h3>
        </div>
        <div class="place-item">
          <img src="images/papi hills.jpg" alt="papi hills">
          <h3>papi hills</h3>
        </div>
        <div class="place-item">
          <img src="images/kolleru lake.jpg" alt="kolleru lake">
          <h3>kolleru lake</h3>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
