<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heritage · Culture · Tourism - Bihar</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
    }

    header {
      background: #4b0082;
      color: white;
      text-align: center;
      padding: 20px;
    }

    /* Tourist Places Section */
    #famous-places {
      padding: 30px;
    }

    .places-gallery {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }

    .place-item {
      background: white;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 15px;
      width: 220px;
    }

    .place-item img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    .place-item h3 {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Heritage · Culture · Tourism</h1>
    <p>Explore Bihar’s rich heritage, culture, and tourism</p>
  </header>

  <main>
    <!-- Tourist Places Section -->
    <section id="famous-places">
      <h2 style="text-align:center;">Famous Tourist Places of Bihar</h2>
      <div class="places-gallery">
        <div class="place-item">
          <img src="images/bodh gaya.png" alt="Mahabodhi Temple">
          <h3>Mahabodhi Temple, Bodh Gaya</h3>
        </div>
        <div class="place-item">
          <img src="images/nalanda.png" alt="Nalanda University Ruins">
          <h3>Nalanda University Ruins</h3>
        </div>
        <div class="place-item">
          <img src="images/rajgir.png" alt="Rajgir">
          <h3>Rajgir</h3>
        </div>
        <div class="place-item">
          <img src="images/vikramshila ruins.png" alt="Vikramshila Ruins">
          <h3>Vikramshila Ruins</h3>
        </div>
        <div class="place-item">
          <img src="images/sahid gurudwara.png" alt="Patna Sahib Gurudwara">
          <h3>Patna Sahib Gurudwara</h3>
        </div>
        <div class="place-item">
          <img src="images/vaishali.png" alt="Vaishali">
          <h3>Vaishali</h3>
        </div>
        <div class="place-item">
          <img src="images/kesariya.png" alt="Kesariya Stupa">
          <h3>Kesariya Stupa</h3>
        </div>
        <div class="place-item">
          <img src="images/sher shah suri tomb.png" alt="Sher Shah Suri Tomb">
          <h3>Sher Shah Suri Tomb, Sasaram</h3>
        </div>
        <div class="place-item">
          <img src="images/bodh gaya1.png" alt="Bodh Gaya">
          <h3>Bodh Gaya</h3>
        </div>
        <div class="place-item">
          <img src="images/munger fort.png" alt="Munger Fort">
          <h3>Munger Fort</h3>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
