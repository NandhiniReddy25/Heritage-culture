<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heritage · Culture · Tourism - Uttarakhand</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
    }

    header {
      background: #4b0082;
      color: white;
      text-align: center;
      padding: 20px;
    }

    /* Tourist Places Section */
    #famous-places {
      padding: 30px;
    }

    .places-gallery {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }

    .place-item {
      background: white;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 15px;
      width: 220px;
    }

    .place-item img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    .place-item h3 {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Heritage · Culture · Tourism</h1>
    <p>Explore Uttarakhand’s rich heritage, culture, and tourism</p>
  </header>

  <main>
    <!-- Tourist Places Section -->
    <section id="famous-places">
      <h2 style="text-align:center;">Famous Tourist Places of Uttar Pradesh</h2>
      <div class="places-gallery">
        <div class="place-item">
          <img src="https://tse3.mm.bing.net/th/id/OIP.6q-MFyBAp7UlMGFNubB5KAHaEK?pid=Api&P=0&h=180" alt="Mahabalipuram">
          <h3>Mahabalipuram</h3>
        </div>
        <div class="place-item">
          <img src="https://tse2.mm.bing.net/th/id/OIP.Hn4wy01agAhyCyMvvEtloQHaE8?pid=Api&P=0&h=180" alt="Kanchipuram">
          <h3>Kanchipuram</h3>
        </div>
        <div class="place-item">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTAuXkwaDn1gDzKgVclmqwQMZaCZUpPVPtA0A&s" alt="Chidambaram">
          <h3>Chidambaram</h3>
        </div>
        <div class="place-item">
          <img src="https://tse3.mm.bing.net/th/id/OIP.dYeb4YkNsClkc2y8qnAi7AHaE8?pid=Api&P=0&h=180" alt="Thanjavur">
          <h3>Thanjavur</h3>
        </div>
        <div class="place-item">
          <img src="https://tse3.mm.bing.net/th/id/OIP.dhhxtvORV9BFj-7ebHPN8gHaFk?pid=Api&P=0&h=180" alt="Ooty">
          <h3>Ooty</h3>
        </div>
        <div class="place-item">
          <img src="https://tse2.mm.bing.net/th/id/OIP.sQyVXxhkk9kdKlLRYM-BRgHaEK?pid=Api&P=0&h=180" alt="Kodaikanal">
          <h3>Kodaikanal</h3>
        </div>
        <div class="place-item">
          <img src="https://tse3.mm.bing.net/th/id/OIP.dhhxtvORV9BFj-7ebHPN8gHaFk?pid=Api&P=0&h=180" alt="Kanyakumari">
          <h3>Kanyakumari</h3>
        </div>
        <div class="place-item">
          <img src="https://tse1.mm.bing.net/th/id/OIP.9WJztJ3hYO6-c9Flqr1lzQHaFL?pid=Api&P=0&h=180" alt="Rameswaram">
          <h3>Rameswaram</h3>
        </div>
        <div class="place-item">
          <img src="https://tse2.mm.bing.net/th/id/OIP.6nTyxEcYT6pqAuNbAn6lHQAAAA?pid=Api&P=0&h=180" alt="Chennai">
          <h3>Chennai</h3>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
